version: '3.8'

services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      - ENV=development
      - DATABASE_URL=postgres://gofiber:password@postgres:5432/gofiber_skeleton?sslmode=disable
      - JWT_SECRET=your-super-secret-jwt-key-change-this-in-production
      - REDIS_URL=redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - gofiber-network
    volumes:
      - ./migrations:/migrations:ro
    restart: unless-stopped

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: gofiber
      POSTGRES_PASSWORD: password
      POSTGRES_DB: gofiber_skeleton
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gofiber -d gofiber_skeleton"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - gofiber-network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - gofiber-network
    restart: unless-stopped

  migrate:
    build: .
    command: ["/migrate"]
    environment:
      - DATABASE_URL=postgres://gofiber:password@postgres:5432/gofiber_skeleton?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./migrations:/migrations:ro
    networks:
      - gofiber-network
    restart: "no"

networks:
  gofiber-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data: